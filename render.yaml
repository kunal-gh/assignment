services:
  - type: web
    name: ai-resume-screener-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # set in Render dashboard — https://aistudio.google.com/apikey
    healthCheckPath: /health
    autoDeploy: true
