name: CI — AI Resume Screener

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─── Job 1: Code Quality ───────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Black formatting check
        run: black --check --line-length 127 src/ tests/ app.py api.py

      - name: isort import order
        run: isort --check-only --profile black src/ tests/ app.py

      - name: Flake8 linting
        run: flake8 src/ tests/ app.py api.py --max-line-length 127 --extend-ignore E203,W503,D

      - name: MyPy type checking
        run: mypy src/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # types still evolving

  # ─── Job 2: Security Scan ─────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install bandit safety
      - name: Bandit security scan
        run: bandit -r src/ -ll --skip B101
      - name: Safety dependency check
        run: safety check -r requirements.txt
        continue-on-error: true  # known advisory false positives

  # ─── Job 3: Unit & Integration Tests ──────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          python -m spacy download en_core_web_sm

      - name: Run test suite with coverage
        run: >
          pytest tests/
          --cov=src
          --cov-report=xml
          --cov-report=term-missing
          --cov-fail-under=70
          -v
          --tb=short
          -x
        env:
          OPENAI_API_KEY: ""  # blank key — LLM tests use fallback

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─── Job 4: Docker Build ───────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: resume-screener:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 5: Performance Smoke Test ────────────────────────────────────────
  performance:
    name: Performance Smoke Test
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm
      - name: Run performance smoke test
        run: |
          python -c "
          import time
          from src.ranking.skill_matcher import SkillMatcher
          m = SkillMatcher()
          start = time.time()
          for _ in range(1000):
              m.calculate_skill_match(['python', 'docker', 'aws'], ['python', 'kubernetes', 'gcp'])
          elapsed = time.time() - start
          print(f'1000 skill matches in {elapsed:.2f}s — {elapsed*1000:.1f}ms avg per match')
          assert elapsed < 5.0, f'Skill matching too slow: {elapsed:.2f}s for 1000 iterations'
          print('Performance check passed!')
          "