name: CI — AI Resume Screener

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Job 1: Backend Lint ──────────────────────────────────────────────────
  backend-quality:
    name: Backend Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install quality tools
        run: pip install black flake8

      - name: Black formatting check
        run: black --check --line-length 127 --skip-string-normalization backend/main.py

      - name: Flake8 linting
        run: flake8 backend/main.py --max-line-length 127 --extend-ignore E203,W503,D,E501

  # ─── Job 2: Security Scan ─────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install bandit

      - name: Bandit security scan
        run: bandit -r backend/main.py -ll --skip B101,B324

  # ─── Job 3: Backend Import Check ──────────────────────────────────────────
  backend-import:
    name: Backend Import Check (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Check backend imports cleanly
        run: python -c "import ast; ast.parse(open('backend/main.py').read()); print('backend/main.py syntax OK')"

  # ─── Job 4: Frontend Type Check ───────────────────────────────────────────
  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─── Job 5: Docker Build ──────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-quality, backend-import]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: ai-resume-screener-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
