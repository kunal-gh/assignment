name: CI — AI Resume Screener

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─── Job 1: Code Quality ───────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install quality tools
        run: pip install black isort flake8

      - name: Black formatting check
        run: black --check --line-length 127 src/ app.py api.py

      - name: isort import order
        run: isort --check-only --profile black src/ app.py

      - name: Flake8 linting
        run: flake8 src/ app.py api.py --max-line-length 127 --extend-ignore E203,W503,D

  # ─── Job 2: Security Scan ─────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install bandit
      - name: Bandit security scan
        run: bandit -r src/ -ll --skip B101,B324

  # ─── Job 3: Unit Tests ────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: pip install pytest pytest-cov numpy

      - name: Run pure-Python unit tests (no ML deps required)
        run: >
          pytest
          tests/test_skill_matcher.py
          tests/test_fairness_checker.py
          tests/test_evaluation.py
          --cov=src/ranking
          --cov=src/utils
          --cov=src/models
          --cov-report=xml
          --cov-report=term-missing
          -v
          --tb=short
        env:
          OPENAI_API_KEY: ""

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─── Job 4: Parser Tests (spaCy required) ─────────────────────────────────
  test-parsers:
    name: Parser Tests (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install parser dependencies
        run: |
          pip install pytest numpy spacy
          python -m spacy download en_core_web_sm

      - name: Run parser unit tests
        run: >
          pytest
          tests/test_section_parser.py
          tests/test_skill_extractor.py
          tests/test_resume_parser.py
          -v
          --tb=short
        continue-on-error: true

  # ─── Job 5: Docker Build ───────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: resume-screener:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 6: Performance Smoke Test ────────────────────────────────────────
  performance:
    name: Performance Smoke Test
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install deps
        run: pip install numpy
      - name: Run performance smoke test
        run: |
          python -c "
          import time, sys
          sys.path.insert(0, '.')
          from src.ranking.skill_matcher import SkillMatcher
          m = SkillMatcher()
          start = time.time()
          for _ in range(1000):
              m.calculate_skill_match(['python', 'docker', 'aws'], ['python', 'kubernetes', 'gcp'])
          elapsed = time.time() - start
          print(f'1000 skill matches in {elapsed:.2f}s')
          assert elapsed < 10.0, f'Too slow: {elapsed:.2f}s'
          print('Performance check passed!')
          "
